<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fmanar Furniture</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- =========================
       HEADER
  ========================= -->
  <header class="header" id="header">

    <div class="logo">
      <img src="images/logo.png" alt="Fmanar Logo">
    </div>

    <nav class="nav">
      <a href="#">Home</a>
      <a href="#">Sofa</a>
      <a href="#">Bedroom</a>
      <a href="#">Dining</a>
      <a href="#">About</a>
    </nav>

  </header>

  <!-- =========================
       HERO VIDEO
  ========================= -->
  <section class="hero">

    <video class="hero-video" autoplay muted loop playsinline>
      <source src="videos/hero.mp4" type="video/mp4">
    </video>

    <div class="hero-content fade">
      <img src="images/fmanarhome.png"
           alt="Fmanar"
           class="hero-logo">

      <p>Design for Better Living</p>

      <button>Explore Collection</button>
    </div>

  </section>

  <!-- =========================
       CATEGORY
  ========================= -->
  <section class="category fade">

    <div class="card">Sofa</div>
    <div class="card">Bedroom</div>
    <div class="card">Dining</div>
    <div class="card">Storage</div>

  </section>

  <!-- =========================
       PRODUCTS
  ========================= -->
  <section class="products fade">

    <div class="products-head">

      <h2>Featured Products</h2>

      <div class="products-arrows">
        <button class="arrow-btn products-prev">&#8249;</button>
        <button class="arrow-btn products-next">&#8250;</button>
      </div>

    </div>

    <div class="products-slider">

      <div class="products-track">

        <a href="#" class="showcase-item">
          <div class="showcase-image">
            <img src="images/1.jpg">
          </div>
          <p>Living Room</p>
        </a>

        <a href="#" class="showcase-item">
          <div class="showcase-image">
            <img src="images/2.jpg">
          </div>
          <p>Dining Room</p>
        </a>

        <a href="#" class="showcase-item">
          <div class="showcase-image">
            <img src="images/3.jpg">
          </div>
          <p>Bedroom</p>
        </a>

        <a href="#" class="showcase-item">
          <div class="showcase-image">
            <img src="images/4.jpg">
          </div>
          <p>Study Room</p>
        </a>

        <a href="#" class="showcase-item">
          <div class="showcase-image">
            <img src="images/5.jpg">
          </div>
          <p>Cabinet</p>
        </a>

      </div>

    </div>

  </section>

  <!-- =========================
       ABOUT
  ========================= -->
  <section class="about fade">

    <div class="about-img"></div>

    <div class="about-text">

      <h2>About Fmanar</h2>

      <p>
        Fmanar is a modern furniture brand focused on
        elegant, minimal and comfortable living spaces.
      </p>

    </div>

  </section>

  <!-- =========================
       FOOTER
  ========================= -->
  <footer>
    © 2026 Fmanar Furniture
  </footer>

  <script src="script.js"></script>

</body>
</html>
